version: '3.8'

services:
    flowise:
        build:
            context: ..
            dockerfile: Dockerfile
        image: flowise-enterprise:local
        restart: unless-stopped
        environment:
            - PORT=3000
            # Enterprise auth — set JWT_SECRET to enable JWT mode
            - JWT_SECRET=flowise-enterprise-dev-secret-change-in-prod
            - ENABLE_AUTH=true
            # Database
            - DATABASE_TYPE=sqlite
            - DATABASE_PATH=/root/.flowise
            # Logging
            - LOG_LEVEL=info
            - LOG_PATH=/root/.flowise/logs
        ports:
            - '3000:3000'
        volumes:
            - flowise-data:/root/.flowise
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/v1/ping']
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 60s

volumes:
    flowise-data:
